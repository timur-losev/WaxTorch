name: C++ Port CI

on:
  workflow_dispatch:
    inputs:
      release_gate:
        description: 'Run strict dependency release gate (fails on <PIN_REQUIRED>)'
        required: false
        default: 'false'
  pull_request:
    paths:
      - '.gitmodules'
      - 'cpp/**'
      - 'cpp/manifest/libtorch-manifest.json'
      - 'fixtures/parity/**'
      - '.github/workflows/cpp-ci.yml'
  push:
    branches: [main]
    paths:
      - '.gitmodules'
      - 'cpp/**'
      - 'cpp/manifest/libtorch-manifest.json'
      - 'fixtures/parity/**'
      - '.github/workflows/cpp-ci.yml'

jobs:
  cpp-build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_gate != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        torch_runtime:
          - cpu_only
          - cuda_preferred
        include:
          - torch_runtime: cpu_only
            cuda_available: '0'
          - torch_runtime: cuda_preferred
            cuda_available: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodules
        run: git submodule sync --recursive

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Verify dependency policy
        run: python3 cpp/scripts/verify_submodules.py --require-checksum-submodules-present

      - name: Configure
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DWAXCPP_REQUIRE_PARITY_FIXTURES=ON -DWAXCPP_REQUIRE_SWIFT_FIXTURES=ON

      - name: Build
        run: cmake --build cpp/build --config Release --parallel

      - name: Generate parity fixtures
        run: ./cpp/build/waxcpp_mv2s_fixture_generator

      - name: Test
        env:
          WAXCPP_TEST_LOG: '1'
          WAXCPP_TORCH_RUNTIME: ${{ matrix.torch_runtime }}
          WAXCPP_TORCH_ASSUME_CUDA_AVAILABLE: ${{ matrix.cuda_available }}
        run: |
          echo "Running C++ tests with WAXCPP_TORCH_RUNTIME=${WAXCPP_TORCH_RUNTIME}, WAXCPP_TORCH_ASSUME_CUDA_AVAILABLE=${WAXCPP_TORCH_ASSUME_CUDA_AVAILABLE}"
          ctest --test-dir cpp/build --output-on-failure

      - name: Test selected libtorch artifact checksum gate
        env:
          WAXCPP_TEST_LOG: '1'
          WAXCPP_REQUIRE_LIBTORCH_MANIFEST: '1'
          WAXCPP_REQUIRE_LIBTORCH_ARTIFACT_SHA256: '1'
          WAXCPP_LIBTORCH_MANIFEST: ${{ github.workspace }}/cpp/manifest/libtorch-manifest.json
          WAXCPP_LIBTORCH_DIST_ROOT: ${{ github.workspace }}/cpp/third_party/libtorch-dist
          WAXCPP_TORCH_RUNTIME: ${{ matrix.torch_runtime }}
          WAXCPP_TORCH_ASSUME_CUDA_AVAILABLE: ${{ matrix.cuda_available }}
        run: |
          echo "Running libtorch checksum gate with manifest ${WAXCPP_LIBTORCH_MANIFEST}"
          ctest --test-dir cpp/build --output-on-failure -R waxcpp_libtorch_manifest_gate_test

  dependency-release-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_gate == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodules
        run: git submodule sync --recursive

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Verify dependency policy (strict pins)
        run: python3 cpp/scripts/verify_submodules.py --enforce-pin-required --require-checksum-submodules-present
